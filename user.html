<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Portal | Hungry Hub</title>
    <link rel="stylesheet" href="styles.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        .user-portal-container {
            padding: 120px 20px 60px;
            max-width: 800px;
            margin: 0 auto;
            min-height: 80vh;
        }

        .auth-card {
            background: rgba(31, 41, 55, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 12px;
            max-width: 400px;
            margin: 0 auto;
            text-align: center;
        }

        .auth-card h2 {
            font-family: 'Cormorant Garamond', serif;
            color: var(--primary);
            font-size: 2.2rem;
            margin-bottom: 24px;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            cursor: pointer;
            color: var(--text-muted);
            font-weight: 500;
            transition: all 0.3s;
        }

        .auth-tab.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }

        .auth-form {
            display: none;
            flex-direction: column;
            gap: 16px;
        }

        .auth-form.active {
            display: flex;
        }

        .auth-form input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .auth-form input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
        }

        /* Dashboard */
        .user-dashboard {
            display: none;
        }

        .user-dashboard.active {
            display: block;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 16px;
        }

        .dashboard-header h2 {
            font-family: 'Cormorant Garamond', serif;
            color: var(--primary);
            font-size: 2.4rem;
        }

        .booking-card {
            background: rgba(31, 41, 55, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            position: relative;
        }

        .booking-card .status-badge {
            position: absolute;
            top: 24px;
            right: 24px;
        }

        .booking-header {
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 12px;
        }

        .booking-header h3 {
            font-family: 'Inter', sans-serif;
            font-size: 1.2rem;
            color: var(--text-light);
        }

        .booking-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .booking-details strong {
            color: var(--text-light);
            display: block;
            margin-bottom: 4px;
        }

        #authError {
            color: #ef4444;
            font-size: 0.9rem;
            margin-top: 8px;
            height: 20px;
        }

        .empty-dashboard {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
    </style>
</head>

<body>
    <!-- ===== NAVBAR ===== -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">🍛</span>
                <span class="logo-text">Hungry Hub</span>
            </a>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="reserve.html">Reserve</a></li>
                <li><a href="reviews.html">Reviews</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="user.html" class="active">My Account</a></li>
            </ul>
            <a href="reserve.html" class="btn btn-nav">Book a Table</a>
            <button class="hamburger" id="hamburger" aria-label="Toggle menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <div class="user-portal-container">
        <!-- Auth Section -->
        <div id="authSection" class="auth-card">
            <h2>Guest Portal</h2>
            <div class="auth-tabs">
                <div class="auth-tab active" id="tabLogin" onclick="switchAuthTab('login')">Login</div>
                <div class="auth-tab" id="tabSignup" onclick="switchAuthTab('signup')">Sign Up</div>
            </div>

            <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
                <input type="email" id="loginEmail" placeholder="Email Address" required />
                <input type="password" id="loginPassword" placeholder="Password" required />
                <button type="submit" class="btn btn-primary" id="loginBtn">Sign In</button>
            </form>

            <form id="signupForm" class="auth-form" onsubmit="handleSignup(event)">
                <input type="text" id="signupName" placeholder="Full Name" required />
                <input type="email" id="signupEmail" placeholder="Email Address" required />
                <input type="password" id="signupPassword" placeholder="Password (min 6 chars)" minlength="6"
                    required />
                <button type="submit" class="btn btn-primary" id="signupBtn">Create Account</button>
            </form>

            <div id="authError"></div>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboardSection" class="user-dashboard">
            <div class="dashboard-header">
                <h2>Welcome, <span id="userName">Guest</span></h2>
                <button class="btn btn-outline" onclick="handleLogout()">Sign Out</button>
            </div>

            <h3 style="margin-bottom: 24px; color: var(--text-light); font-weight: 500;">Your Reservations</h3>
            <div id="bookingsList">
                <div class="empty-dashboard">
                    <i class="fas fa-calendar-times" style="font-size: 3rem; margin-bottom: 16px; opacity: 0.5;"></i>
                    <p>You haven't made any reservations yet.</p>
                    <a href="reserve.html" class="btn btn-primary" style="margin-top: 16px; display: inline-block;">Book
                        a Table</a>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Hungry Hub. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="app.js"></script>
    <script src="user.js"></script>
</body>

</html>
